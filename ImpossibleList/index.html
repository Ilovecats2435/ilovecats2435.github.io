<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frost Legion Demonlist - Impossible List</title>
  <style>
    :root {--bg:#0b1220;--panel:#101a33;--card:#12244f;--text:#eff4ff;--muted:#b3c7ed;--accent:#59cdff;--border:#2f4f9a;}
    *{box-sizing:border-box;}
    body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:radial-gradient(circle at 15% 0%,#1b294f 0%,#0b1220 42%,#05080f 100%);color:var(--text);}
.layout{display:grid;grid-template-columns:1fr;gap:1rem;max-width:1200px;margin:1rem auto;padding:0 1rem;}
    .sidebar{background:rgba(14,22,47,.95);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:.9rem;position:sticky;top:1rem;align-self:start;}
    .sidebar h2{margin:.2rem 0 .6rem;color:#fff;letter-spacing:.3px;}
    .sidebar ul{list-style:none;margin:0;padding:0;}
    .sidebar li{margin:.2rem 0;}
    .sidebar a{color:#dbe6ff;text-decoration:none;padding:.25rem .35rem;display:block;border-radius:.4rem;}
    .sidebar a:hover{background:#223f89;}
    .sub{margin-left:.7rem;}
    .toggle{width:100%;background:none;border:none;color:#dbe6ff;text-align:left;padding:.3rem .25rem;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:space-between;border-radius:.35rem;}
    .toggle:hover{background:#1d3f8f;}
    .hidden{display:none;}
    .content{background:rgba(14,21,45,.9);border:1px solid #2a4e9d;border-radius:12px;padding:1rem;}
    .hero{border-radius:10px;border:1px solid rgba(255,255,255,.12);background:linear-gradient(135deg,#1b396a,#0e193e);padding:.9rem;}
    .hero h1{margin:.1rem 0 .25rem;}
    .hero p{margin:0;color:#dce8ff;}
    .cardholder{margin-top:1rem;display:grid;grid-template-columns:1fr;gap:.8rem;}
    .demon-card{background:#0e1a43;border:1px solid #314f9b;border-radius:10px;padding:.7rem;display:grid;grid-template-columns:150px 1fr;gap:.7rem;}
    .thumb{border:1px dashed #5f7ec7;border-radius:8px;background:#0a132a;min-height:120px;display:flex;align-items:center;justify-content:center;color:#a6bce4;font-size:.8rem;}
    .info{display:flex;flex-direction:column;gap:.25rem;}
    .by{font-weight:700;color:#b4d4ff;letter-spacing:.2px;}
    .meta{font-size:.9rem;color:#dce8ff;margin:.1rem 0;}
    .form-section{margin-top:1rem;border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:.8rem;background:#111f45;}
    .form-row{display:grid;grid-template-columns:1fr 150px;gap:.4rem;align-items:center;margin:.3rem 0;}
    .form-row label{font-size:.9rem;color:#c9d7f2;}
    .form-row input{width:100%;padding:.4rem .45rem;border-radius:.4rem;border:1px solid #3a5db6;background:#0d1d47;color:#fff;}
    .add-btn{background:#27a8ff;border:0;color:white;border-radius:.5rem;padding:.45rem .7rem;cursor:pointer;margin-top:.55rem;}
    .footer{margin-top:1rem;padding:.8rem 0;font-size:.85rem;color:#acbcdf;border-top:1px solid rgba(255,255,255,.1);}
@media (max-width:900px){.layout{grid-template-columns:1fr;padding:0;}.sidebar{display:none;}}
  
.topbar{position:sticky;top:0;z-index:400;background:rgba(8,12,30,.96);padding:.45rem 1rem;display:flex;align-items:center;gap:.6rem;border-bottom:1px solid rgba(255,255,255,.08);}
.hamburger{font-size:1.2rem;background:none;border:1px solid #3f5bc8;border-radius:.3rem;color:#fff;padding:.2rem .45rem;cursor:pointer;}
.topbar-title{font-weight:700;color:#fff;}
.left-menu{position:fixed;left:.4rem;top:3.6rem;background:#0b1334;border:1px solid #2d4e9f;border-radius:.5rem;padding:.45rem .5rem;display:none;z-index:450;min-width:190px;}
.left-menu.show{display:block;}
.left-menu a{display:block;color:#dbe6ff;text-decoration:none;padding:.2rem 0;border-radius:.2rem;}
.left-menu a:hover{background:#1f3f8f;}
.left-menu .menu-section{margin:.35rem 0 .15rem;color:#9db8ff;font-size:.8rem;letter-spacing:.3px;}
</style>
</head>
<body>
<div class="topbar"><button id="menuBtn" class="hamburger">☰</button><div class="topbar-title">Frost Legion Demonlist</div></div>
<div id="leftMenu" class="left-menu hidden">
  <a href="/home/">Home</a>
  <div class="menu-section">Lists</div>
  <a href="/MainList/">Main List</a>
  <a href="/ExtendedList/">Extended List</a>
  <a href="/ImpossibleList/">Impossable List</a>
  <a href="/PlatformerList/">Platformer list</a>
  <div class="menu-section">More</div>
  <a href="/PlayerStats/">Player Stats</a>
  <a href="/Submit/">Submit</a>
</div>

<div class="layout">
<main class="content">
      <div class="hero"><h1>Impossible List</h1><p>This is the Impossible list.</p></div>
      <div class="footer">Contact us: Discord: m7ja3kcdMJ</div>
    </main>
  </div>
  <script>
const menuBtn=document.getElementById('menuBtn');
const leftMenu=document.getElementById('leftMenu');
if(menuBtn){menuBtn.addEventListener('click',()=>{leftMenu?.classList.toggle('show');});}
const toggles=document.querySelectorAll('.toggle');
toggles.forEach(btn=>{btn.addEventListener('click',()=>{const show=document.getElementById(btn.dataset.target); if(!show) return; const hidden=show.classList.toggle('hidden'); btn.textContent=(hidden?'▸':'▾')+' '+btn.textContent.slice(2);});});
</script>
</body>
</html>
<!DOCTYPE html>
<html>
<head>
<title>Demon List Card</title>
<style>
/* 1. Basic Reset and Card Container */
.demon-list-card {
  display: flex; /* Arranges video and details side-by-side */
  border: 1px solid #0ad0c6; /* Add a border to see the card outline */
  background-color: #216ac2; /* Light background */
  margin-bottom: 20px; /* Space between cards */
  font-family: Arial, sans-serif; /* A simple font */
  border-radius: 8px; /* Rounded corners for a modern look */
  overflow: hidden; /* Keeps the video within rounded corners */
}

/* 2. Styling the Video Section */
.demon-list-card .video-container {
  flex: 0 0 40%; /* Set a specific width (40%) and don't let it grow or shrink */
  position: relative; /* Essential for making responsive videos */
  padding-bottom: 22.5%; /* 16:9 aspect ratio padding for the container */
  height: 0; /* Let padding define the height */
}

.demon-list-card .video-container iframe {
  position: absolute; /* Position the video over the padded container */
  top: 0;
  left: 0;
  width: 100%; /* Fill the container's width */
  height: 100%; /* Fill the container's height */
  border: none; /* Remove the standard video border */
}

/* 3. Styling the Details Section */
.demon-list-card .details {
  flex: 1; /* This section will grow to fill the remaining space */
  padding: 20px; /* Space inside the text area */
}

.demon-list-card .details h3 {
  margin-top: 0; /* Remove default margin from the title */
  margin-bottom: 10px; /* Space below the title */
  font-size: 24px; /* Make the title stand out */
  color: #070639; /* A dark color for the text */
}

.demon-list-card .details p {
  margin: 5px 0; /* Small space between lines of details */
  font-size: 16px; /* Text size for the details */
  color: #2c2a89; /* A slightly lighter color for the details */
}
</style>
</head>
<body>

<div class="demon-list-card">

  <div class="video-container">
    <iframe src="https://www.youtube.com/embed/S_I5O2p-iFw" title="YouTube video player" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
  </div>

  <div class="details">
    <h3></h3>
    <p>Verified By: </p>
    <p>ID: </p>
    <p>List Points: </p>
  </div>

</div>

</body>
</html>
